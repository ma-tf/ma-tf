<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 1rem;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div>
    <h1>Under Construction</h1>
    <p>Something is on its way.</p>
    <div class="links">
      <span>Matt F</span>
      <a href="https://github.com/ma-tf">github.com/ma-tf</a>
    </div>
  </div>
</body>

</html>
